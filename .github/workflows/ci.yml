name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Provide placeholder env vars so build doesn't fail on missing values
          NEXT_PUBLIC_SITE_URL: https://upendrapublicity.com
          NEXT_PUBLIC_WHATSAPP_PHONE: "910000000000"
          NEXT_PUBLIC_PHONE_NUMBER: "+91-0000-000000"
          NEXT_PUBLIC_EMAIL: info@upendrapublicity.com
          DATABASE_URL: "file:./dev.db"
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: noreply@example.com
          SMTP_PASS: placeholder
          ADMIN_EMAIL: noreply@example.com
